server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets
  location ~* \.(js|css|png|jpg|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
